# Conda environment for BPD Measurement project
# Adapts Collins et al. 2026 heatmap regression from femur FL to fetal BPD.
#
# Create:  conda env create -f environment.yml
# Activate: conda activate pbp_measurement
# Update:   conda env update -f environment.yml --prune
#
# CUDA note: this spec targets CUDA 11.8 (cu118).
# For a CPU-only machine, replace the torch/torchvision pip lines with
# the CPU variants from https://pytorch.org/get-started/locally/

name: pbp_measurement

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - pip:
    # --- Deep learning (CUDA 11.8) ---
    - torch==2.7.1+cu118 --index-url https://download.pytorch.org/whl/cu118
    - torchvision==0.22.1+cu118 --index-url https://download.pytorch.org/whl/cu118

    # --- Model ---
    - segmentation-models-pytorch>=0.3.4
    - timm>=1.0.0

    # --- Image / augmentation ---
    - albumentations>=1.4.0
    - Pillow>=10.0

    # --- Scientific computing ---
    - numpy>=2.1
    - scipy>=1.13
    - scikit-learn>=1.5

    # --- Data / visualisation ---
    - pandas>=2.2
    - matplotlib>=3.8
    - tqdm>=4.66

    # --- Utilities ---
    - requests>=2.31
